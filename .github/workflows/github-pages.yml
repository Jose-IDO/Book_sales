# Deploy a static build to GitHub Pages (catalog + mailto reservation flow).
# Full API, file uploads, and admin require a Node host (e.g. Vercel).

name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Remove server-only routes (not supported by static export)
        run: rm -rf app/api && rm -f middleware.ts

      - name: Build static site
        env:
          STATIC_EXPORT: "1"
          NEXT_PUBLIC_DEPLOY_MODE: static
          NEXT_PUBLIC_RESERVATION_EMAIL: ${{ vars.RESERVATION_EMAIL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npx prisma generate && npx next build

      - name: Add Pages marker
        run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
